<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>El misteri del castell</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background-image: url("castell.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
    }

    .container {
      display: flex;
      gap: 120px;
    }

    .container img {
      max-width: 200px;
      height: auto;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="catala.png" onclick="guardarIdioma('ca')" alt="Català">
    <img src="castellano.png" onclick="guardarIdioma('es')" alt="Castellano">
  </div>

  <script>
    function guardarIdioma(idioma) {
      localStorage.setItem('idioma_juego', idioma);
      if (idioma === 'ca') {
        window.location.href = 'https://sites.google.com/view/elmisteriodelcastillo/instruccions';
      } else {
        window.location.href = 'https://sites.google.com/view/elmisteriodelcastillo/instrucciones';
      }
    }

    // Redirección automática si hay código en la URL
    var urlParams = new URLSearchParams(window.location.search);
    var codigo = urlParams.get('c');

    if (codigo) {
      var idioma = localStorage.getItem('idioma_juego');
      
      var destinos = {
        'ca': {
          '16M5': 'https://sites.google.com/view/elmisteriodelcastillo/llums-en-la-nit',
          'Q2p7': 'https://sites.google.com/view/elmisteriodelcastillo/tercera-pista-ca',
          '5Rz1': 'https://sites.google.com/view/elmisteriodelcastillo/cuarta-pista-ca',
          '7Mw3': 'https://sites.google.com/view/elmisteriodelcastillo/quinta-pista-ca',
          '3F9a': 'https://sites.google.com/view/elmisteriodelcastillo/sexta-pista-ca'
        },
        'es': {
          '16M5': 'https://sites.google.com/view/elmisteriodelcastillo/luces-en-la-noche',
          'Q2p7': 'https://sites.google.com/view/elmisteriodelcastillo/tercera-pista-es',
          '5Rz1': 'https://sites.google.com/view/elmisteriodelcastillo/cuarta-pista-es',
          '7Mw3': 'https://sites.google.com/view/elmisteriodelcastillo/quinta-pista-es',
          '3F9a': 'https://sites.google.com/view/elmisteriodelcastillo/sexta-pista-es'
        }
      };

      if (idioma && destinos[idioma] && destinos[idioma][codigo]) {
        window.location.href = destinos[idioma][codigo];
      }
    }
  </script>
</body>
</html>
