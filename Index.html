<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>El misteri del castell</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background-image: url("castell.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
    }

    .container {
      display: flex;
      gap: 120px;
    }

    .container img {
      max-width: 200px;
      height: auto;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="catala.png" onclick="guardarIdioma('ca')" alt="Català">
    <img src="castellano.png" onclick="guardarIdioma('es')" alt="Castellano">
  </div>

  <script>
    // Guardar idioma elegido
    function guardarIdioma(idioma) {
      localStorage.setItem('idioma_juego', idioma);
      if (idioma === 'ca') {
        window.location.href = 'https://sites.google.com/view/elmisteriodelcastillo/instruccionsQR';
      } else {
        window.location.href = 'https://sites.google.com/view/elmisteriodelcastillo/instruccionesQR';
      }
    }

    // Redirección automática si hay código
    var urlParams = new URLSearchParams(window.location.search);
    var codigo = urlParams.get('c');

    if (codigo) {
      var idioma = localStorage.getItem('idioma_juego');
      
      // Mapeo de códigos por orden
      var ordenPistas = ['16M5', 'Q2p7', '5Rz1', '7Mw3', '3F9a'];
      var indiceActual = ordenPistas.indexOf(codigo);
      
      // Obtener pistas desbloqueadas (array en localStorage)
      var pistasDesbloqueadas = localStorage.getItem('pistas_desbloqueadas');
      if (!pistasDesbloqueadas) {
        pistasDesbloqueadas = [];
      } else {
        pistasDesbloqueadas = JSON.parse(pistasDesbloqueadas);
      }
      
      // Comprobar si puede acceder a esta pista
      var puedeAcceder = false;
      
      if (indiceActual === 0) {
        // Pista 1: siempre accesible (no necesita pista previa)
        puedeAcceder = true;
      } else {
        // Necesita tener desbloqueada la pista anterior
        var pistaAnterior = ordenPistas[indiceActual - 1];
        puedeAcceder = pistasDesbloqueadas.includes(pistaAnterior);
      }
      
      // URLs de destino según idioma
      var destinos = {
        'ca': {
          '16M5': 'https://sites.google.com/view/elmisteriodelcastillo/llums-al-capvespre',
          'Q2p7': 'https://sites.google.com/view/elmisteriodelcastillo/el-murmuri-de-laigua',
          '5Rz1': 'https://sites.google.com/view/elmisteriodelcastillo/landana-oblidada',
          '7Mw3': 'https://sites.google.com/view/elmisteriodelcastillo/fragments-del-passat',
          '3F9a': 'https://sites.google.com/view/elmisteriodelcastillo/lespera-eterna'
        },
        'es': {
          '16M5': 'https://sites.google.com/view/elmisteriodelcastillo/luces-al-atardecer',
          'Q2p7': 'https://sites.google.com/view/elmisteriodelcastillo/el-susurro-del-agua',
          '5Rz1': 'https://sites.google.com/view/elmisteriodelcastillo/el-andén-olvidado',
          '7Mw3': 'https://sites.google.com/view/elmisteriodelcastillo/fragmentos-del-pasado',
          '3F9a': 'https://sites.google.com/view/elmisteriodelcastillo/la-eterna-espera'
        }
      };
      
      var pistaNoAccesible = {
        'ca': 'https://sites.google.com/view/elmisteriodelcastillo/pista-no-accessible',
        'es': 'https://sites.google.com/view/elmisteriodelcastillo/pista-no-accesible'
      };
      
      // Redirigir
      if (!idioma) {
        // No hay idioma, no redirigimos (para que elija)
      } else if (puedeAcceder) {
        // Marcar esta pista como desbloqueada
        if (!pistasDesbloqueadas.includes(codigo)) {
          pistasDesbloqueadas.push(codigo);
          localStorage.setItem('pistas_desbloqueadas', JSON.stringify(pistasDesbloqueadas));
        }
        window.location.href = destinos[idioma][codigo];
      } else {
        window.location.href = pistaNoAccesible[idioma];
      }
    }
  </script>
</body>
</html>
