<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>El misteri del castell</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background-image: url("castell.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
    }

    .container {
      display: flex;
      gap: 120px;
    }

    .container a img {
      max-width: 200px;
      height: auto;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="https://sites.google.com/view/elmisteriodelcastillo/instruccions">
      <img src="catala.png">
    </a>
    <a href="https://sites.google.com/view/elmisteriodelcastillo/instrucciones">
      <img src="castellano.png" alt="Instrucciones">
    </a>
  </div>

  <script>
    // Esta parte se ejecuta automáticamente
    var idioma = localStorage.getItem('idioma_juego');
    var urlParams = new URLSearchParams(window.location.search);
    var codigo = urlParams.get('c');

    var destinos = {
      'ca': {
        '8xK4': 'https://sites.google.com/view/elmisteriodelcastillo/instruccions',
        '16M5': 'https://sites.google.com/view/elmisteriodelcastillo/llums-en-la-nit',
        'Q2p7': 'https://sites.google.com/view/elmisteriodelcastillo/tercera-pista-ca',
        '5Rz1': 'https://sites.google.com/view/elmisteriodelcastillo/cuarta-pista-ca',
        '7Mw3': 'https://sites.google.com/view/elmisteriodelcastillo/quinta-pista-ca',
        '3F9a': 'https://sites.google.com/view/elmisteriodelcastillo/sexta-pista-ca'
      },
      'es': {
        '8xK4': 'https://sites.google.com/view/elmisteriodelcastillo/instrucciones',
        '16M5': 'https://sites.google.com/view/elmisteriodelcastillo/luces-en-la-noche',
        'Q2p7': 'https://sites.google.com/view/elmisteriodelcastillo/tercera-pista-es',
        '5Rz1': 'https://sites.google.com/view/elmisteriodelcastillo/cuarta-pista-es',
        '7Mw3': 'https://sites.google.com/view/elmisteriodelcastillo/quinta-pista-es',
        '3F9a': 'https://sites.google.com/view/elmisteriodelcastillo/sexta-pista-es'
      }
    };

    // Si hay código en la URL, redirigir automáticamente
    if (codigo) {
      if (!idioma) {
        window.location.href = 'https://sites.google.com/view/elmisteriodelcastillo/inici';
      } else if (destinos[idioma] && destinos[idioma][codigo]) {
        window.location.href = destinos[idioma][codigo];
      } else {
        window.location.href = 'https://sites.google.com/view/elmisteriodelcastillo/inici';
      }
    }
  </script>
</body>
</html>
